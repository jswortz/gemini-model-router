version: 1

sandbox:
  mode: tempdir          # tempdir | docker
  copy_cwd: false

classifier:
  type: embed_anchors    # embed_anchors | mmbert (Phase-2)
  model: sentence-transformers/all-MiniLM-L6-v2
  anchors_file: config/anchors.yaml
  cache_dir: ~/.router/cache
  softmax_temp: 0.07

policy:
  weights:
    quality: 1.0
    cost: 0.4
    latency: 0.3
  confidence_margin: 0.05
  fallback_backend: gemma4
  cost_ceiling_usd_per_request: 0.10
  sticky_bonus: 0.05

logging:
  path: ~/.router/sessions/router_history.jsonl
  redact_prompts: false

backends:
  - name: gemma4
    kind: vllm
    endpoint: http://localhost:8000/v1
    model: google/gemma-4-it
    capabilities: [stream, local]
    cost_in_per_1m: 0.0
    cost_out_per_1m: 0.0
    expected_latency_ms_per_1k_out: 80
    max_context: 8192

  - name: gemini
    kind: gemini_cli
    binary: gemini
    extra_args: ["--output-format", "json"]
    capabilities: [tools, long_ctx]
    cost_in_per_1m: 0.30
    cost_out_per_1m: 2.50
    expected_latency_ms_per_1k_out: 350
    max_context: 1000000

  - name: claude
    kind: claude_cli
    binary: claude
    extra_args: ["--output-format", "json", "--bare"]
    capabilities: [tools, agentic, long_ctx]
    cost_in_per_1m: 3.00
    cost_out_per_1m: 15.00
    expected_latency_ms_per_1k_out: 600
    max_context: 200000
    resume_flag: "--resume"
